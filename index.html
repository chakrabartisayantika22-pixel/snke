<!DOCTYPE html>
<html>
<head>
  <title>Snake Game</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #111;
      color: white;
    }

    canvas {
      background: black;
      margin-top: 20px;
      border: 2px solid white;
    }

    button {
      font-size: 20px;
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      border: none;
    }
  </style>
</head>

<body>

<h1>🐍 Snake Game</h1>
<p>Use arrow keys or buttons to play</p>
<p id="score">Score: 0</p>

<canvas id="game" width="400" height="400"></canvas>

<!-- Mobile Controls -->
<div>
  <button onclick="setDirection('LEFT')">⬅️</button>
  <button onclick="setDirection('UP')">⬆️</button>
  <button onclick="setDirection('DOWN')">⬇️</button>
  <button onclick="setDirection('RIGHT')">➡️</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let snake = [{x: 200, y: 200}];
let dx = 20;
let dy = 0;

let apple = {
  x: Math.floor(Math.random() * 20) * 20,
  y: Math.floor(Math.random() * 20) * 20
};

let score = 0;

document.addEventListener("keydown", changeDirection);

// Keyboard controls
function changeDirection(event) {
  const key = event.keyCode;

  if (key === 37 && dx === 0) { dx = -20; dy = 0; }
  if (key === 38 && dy === 0) { dx = 0; dy = -20; }
  if (key === 39 && dx === 0) { dx = 20; dy = 0; }
  if (key === 40 && dy === 0) { dx = 0; dy = 20; }
}

// Mobile button controls
function setDirection(dir) {
  if (dir === 'LEFT' && dx === 0) { dx = -20; dy = 0; }
  if (dir === 'RIGHT' && dx === 0) { dx = 20; dy = 0; }
  if (dir === 'UP' && dy === 0) { dx = 0; dy = -20; }
  if (dir === 'DOWN' && dy === 0) { dx = 0; dy = 20; }
}

function gameLoop() {
  setTimeout(() => {
    clearCanvas();
    moveSnake();
    drawApple();
    drawSnake();
    checkGameOver();
    gameLoop();
  }, 100);
}

function clearCanvas() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawSnake() {
  ctx.fillStyle = "lime";
  snake.forEach(part => {
    ctx.fillRect(part.x, part.y, 20, 20);
  });
}

function moveSnake() {
  const head = {x: snake[0].x + dx, y: snake[0].y + dy};
  snake.unshift(head);

  if (head.x === apple.x && head.y === apple.y) {
    score++;
    document.getElementById("score").innerText = "Score: " + score;

    apple = {
      x: Math.floor(Math.random() * 20) * 20,
      y: Math.floor(Math.random() * 20) * 20
    };
  } else {
    snake.pop();
  }
}

function drawApple() {
  ctx.fillStyle = "red";
  ctx.fillRect(apple.x, apple.y, 20, 20);
}

function checkGameOver() {
  const head = snake[0];

  // Wall collision
  if (head.x < 0 || head.y < 0 || head.x >= 400 || head.y >= 400) {
    alert("Game Over!");
    location.reload();
  }

  // Self collision
  for (let i = 1; i < snake.length; i++) {
    if (head.x === snake[i].x && head.y === snake[i].y) {
      alert("Game Over!");
      location.reload();
    }
  }
}

gameLoop();
</script>

</body>
</html>
